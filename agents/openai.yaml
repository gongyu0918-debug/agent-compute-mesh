interface:
  display_name: "Agent 算力分布网络 / Agent Compute Mesh"
  short_description: "Decentralized task routing and compute leasing / 去中心化任务路由与算力租约"
  default_prompt: "Use $agent-compute-mesh to publish a redacted bounded task to the compute mesh, execute it through isolated worker leases, and return only signed result bundles plus billing receipts. / 用 $agent-compute-mesh 把脱敏且边界明确的任务发布到算力网，通过隔离 worker 租约执行，并只返回签名结果包和计费回执。"

policy:
  allow_implicit_invocation: true
